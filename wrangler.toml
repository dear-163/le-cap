name = "elan-quant"
compatibility_date = "2026-07-01"
pages_build_output_dir = "public"

# KV namespace binding (RATE_LIMIT_KV) is intentionally NOT declared here.
# For a Git-connected Cloudflare Pages project, bind it from the dashboard instead:
# Settings -> Functions -> KV namespace bindings -> Add binding (name: RATE_LIMIT_KV).
# A placeholder/invalid id here would make Cloudflare fail to resolve the binding at
# build time, which is what caused the deployment to come up as 522 before this fix.
